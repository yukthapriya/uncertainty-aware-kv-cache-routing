version: "3.9"

services:
  router:
    build: .
    container_name: kv-router
    ports:
      - "8000:8000"
    depends_on:
      - mock-node-1
      - mock-node-2
      - mock-node-3

  mock-node-1:
    build: .
    container_name: mock-node-1
    command: uvicorn mock_node:app --host 0.0.0.0 --port 8101
    environment:
      NODE_NAME: node1
      FAILURE_RATE: "0.0"
      KV_USED_MB_BASE: "1200"
      ACTIVE_REQUESTS_BASE: "2"
    ports:
      - "8101:8101"

  mock-node-2:
    build: .
    container_name: mock-node-2
    command: uvicorn mock_node:app --host 0.0.0.0 --port 8102
    environment:
      NODE_NAME: node2
      FAILURE_RATE: "0.3"
      KV_USED_MB_BASE: "2200"
      ACTIVE_REQUESTS_BASE: "4"
    ports:
      - "8102:8102"

  mock-node-3:
    build: .
    container_name: mock-node-3
    command: uvicorn mock_node:app --host 0.0.0.0 --port 8103
    environment:
      NODE_NAME: node3
      FAILURE_RATE: "0.0"
      KV_USED_MB_BASE: "3200"
      ACTIVE_REQUESTS_BASE: "1"
    ports:
      - "8103:8103"